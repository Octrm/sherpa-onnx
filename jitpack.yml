jdk:
  - openjdk17

before_install:
  # Install JDK 8 first (sdkmanager needs XML bindings not in JDK 17)
  - sdk install java 8.0.265-open
  - sdk use java 8.0.265-open
  # Accept licenses and install NDK + CMake via sdkmanager
  - yes | sdkmanager --licenses
  - yes | sdkmanager --update
  - yes | sdkmanager --install "ndk;27.0.11718014"
  - yes | sdkmanager --install "cmake;3.22.1"
  # Switch back to JDK 17 for the build
  - sdk install java 17.0.3-tem
  - sdk use java 17.0.3-tem
  # Build native libraries and copy to AAR jniLibs
  - |
    export ANDROID_NDK=$ANDROID_HOME/ndk/27.0.11718014
    export PATH=$ANDROID_HOME/cmake/3.22.1/bin:$PATH
    export SHERPA_ONNX_ENABLE_C_API=ON
    export SHERPA_ONNX_RENAME_ONNXRUNTIME=ON

    echo "cmake version: $(cmake --version)"
    echo "ANDROID_NDK: $ANDROID_NDK"

    ./build-android-arm64-v8a.sh
    ./build-android-x86-64.sh

    cp -v ./build-android-arm64-v8a/install/lib/*.so android/SherpaOnnxAar/sherpa_onnx/src/main/jniLibs/arm64-v8a/
    cp -v ./build-android-x86-64/install/lib/*.so android/SherpaOnnxAar/sherpa_onnx/src/main/jniLibs/x86_64/

install:
  - |
    cd android/SherpaOnnxAar
    ./gradlew :sherpa_onnx:assembleRelease
    SHERPA_ONNX_VERSION=$(grep "SHERPA_ONNX_VERSION" ../../CMakeLists.txt | cut -d " " -f 2 | cut -d '"' -f 2)
    cp ./sherpa_onnx/build/outputs/aar/sherpa_onnx-release.aar ../../sherpa-onnx-${SHERPA_ONNX_VERSION}.aar
    cd ../..
    FILE="-Dfile=sherpa-onnx-${SHERPA_ONNX_VERSION}.aar"
    mvn install:install-file $FILE -DgroupId=com.k2fsa.sherpa.onnx -DartifactId=sherpa-onnx -Dversion=${SHERPA_ONNX_VERSION} -Dpackaging=aar -DgeneratePom=true

env:
  ANDROID_NDK: /opt/android-sdk-linux/ndk/27.0.11718014
